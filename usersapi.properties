spring.application.name=usersapi
server.port=0

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=qwerty

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.level.root=INFO
logging.level.com.mod4.jpaapi.exceptionhandling=DEBUG
logging.file.name=logs/UsersAPI.log
logging.file.path=logs

spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.retries=3
spring.kafka.producer.acks=all
spring.kafka.producer.batch-size=16384
spring.kafka.producer.retry.backoff.ms=2000
spring.kafka.producer.delivery-timeout-ms=60000
spring.kafka.producer.request-timeout-ms=30000

app.topic-name=test-topic

springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.operationsSorter=method

spring.hateoas.use-hal-as-default-json-media-type=false

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.instance-id=${spring.application.name}:${random.value}

