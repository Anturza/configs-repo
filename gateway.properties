spring.application.name=gateway

server.port=8765

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

logging.level.root=INFO
logging.file.name=logs/gateway.log
logging.file.path=logs

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=mailapp_route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://mailapp
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/test

spring.cloud.gateway.server.webflux.routes[1].id=users_route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://usersapi
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/users/**
